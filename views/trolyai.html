<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="ai-maintenance-page" style="display: flex; justify-content: center; align-items: center; height: 75vh;">
    <div class="maintenance-card" style="background: white; padding: 50px 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); text-align: center; max-width: 500px; width: 100%;">
        
        <div class="icon-box" style="margin-bottom: 25px;">
            <i class="fa-solid fa-screwdriver-wrench fa-bounce" style="font-size: 4rem; color: #4318ff;"></i>
        </div>
        
        <h2 style="color: #2b3674; font-size: 1.8rem; margin-bottom: 15px; font-weight: 700;">Tính Năng Đang Phát Triển</h2>
        
        <p style="color: #a3aed1; font-size: 1rem; line-height: 1.6; margin-bottom: 30px;">
            Trợ lý ảo thông minh <b>Mahiru AI</b> hiện đang được tối ưu hóa thuật toán và kết nối cơ sở dữ liệu lớn. Tính năng này sẽ sớm ra mắt trong phiên bản cập nhật tiếp theo!
            <br><br>
            <i>Kính mong thầy/cô thông cảm vì sự bất tiện này.</i>
        </p>
        
        <div class="progress-container" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <div class="progress-bg" style="width: 80%; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden;">
                <div class="progress-fill" style="width: 65%; height: 100%; background: #4318ff; border-radius: 5px;"></div>
            </div>
            <span style="color: #4318ff; font-weight: 700; font-size: 0.9rem;">Tiến độ hoàn thiện: 65%</span>
        </div>
        
    </div>
</div>
</body>
</html>
