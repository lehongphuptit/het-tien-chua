<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="transaction-page">
    <div class="form-card">
        <h3><i class="fa-solid fa-bullseye"></i> Thiết Lập Ngân Sách</h3>
        <form id="formNganSach">
            <div class="form-group">
                <label>Danh mục áp dụng</label>
                <select id="danhMucNganSachSelect" class="form-control" required>
                    </select>
            </div>
            
            <div class="form-group">
                <label>Hạn mức tối đa (VNĐ)</label>
                <input type="number" id="hanMuc" placeholder="0" min="1000" required>
            </div>

            <button type="submit" class="btn-submit"><i class="fa-solid fa-floppy-disk"></i> Lưu Ngân Sách</button>
        </form>
    </div>

    <div class="table-card">
        <h3><i class="fa-solid fa-chart-bar"></i> Tiến Độ Chi Tiêu</h3>
        <div id="danhSachNganSach" class="budget-list">
            </div>
    </div>
</div>
</body>
</html>
