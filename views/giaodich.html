<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="transaction-page">
    <div class="form-card">
        <h3><i class="fa-solid fa-plus-circle"></i> Thêm Giao Dịch</h3>
        <form id="formGiaoDich">
            <div class="form-group">
                <label>Loại giao dịch</label>
                <select id="loaiGiaoDich">
                    <option value="chi">Chi tiêu (Khoản trừ)</option>
                    <option value="thu">Thu nhập (Khoản cộng)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Danh mục</label>
                <select id="danhMucSelect" required>
                    <option value="">-- Chọn danh mục --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Số tiền (VNĐ)</label>
                <input type="number" id="soTien" placeholder="0" min="1000" required>
            </div>

            <div class="form-group">
                <label>Ngày giao dịch</label>
                <input type="date" id="ngayGiaoDich" required>
            </div>

            <div class="form-group">
                <label>Ghi chú</label>
                <input type="text" id="ghiChu" placeholder="Mô tả thêm...">
            </div>

            <button type="submit" class="btn-submit"><i class="fa-solid fa-floppy-disk"></i> Lưu Giao Dịch</button>
        </form>
    </div>

    <div class="table-card">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Lịch Sử Giao Dịch</h3>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Ngày</th>
                        <th>Danh mục</th>
                        <th>Ghi chú</th>
                        <th>Số tiền</th>
                        <th>Xóa</th>
                    </tr>
                </thead>
                <tbody id="bangGiaoDich">
                    </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
