<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
    <div style="text-align: center; margin-bottom: 30px;">
        <i class="fa-solid fa-circle-user" style="font-size: 60px; color: #2563eb;"></i>
        <h2 style="color: #2b3674; margin-top: 15px;">Chỉnh Sửa Hồ Sơ</h2>
        <p style="color: #707eae;">Cập nhật thông tin cá nhân của bạn</p>
    </div>
    <div style="margin-bottom: 20px;">
        <label style="display: block; font-weight: bold; margin-bottom: 10px; color: #2b3674;">
            <i class="fa-solid fa-signature"></i> Tên hiển thị mới:
        </label>
        <input type="text" id="inputDoiTen" style="width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; font-size: 16px;" placeholder="Nhập họ và tên mới...">
    </div>

    <button id="btnLuuHoSo" style="width: 100%; padding: 15px; border: none; border-radius: 10px; background: #2563eb; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;">
        <i class="fa-solid fa-cloud-arrow-up"></i> Cập Nhật Lên Hệ Thống
    </button>
</div>
</body>
</html>
